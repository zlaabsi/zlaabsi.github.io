baseURL: "https://zlaabsi.github.io/"
languageCode: en-us
title: "Zakaria Laabsi"
pagination:
  pagerSize: 10
theme: PaperMod

enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false

minify:
  disableXML: true
  minifyOutput: true

frontmatter:
  lastmod:
    - lastmod
    - ":fileModTime"

outputFormats:
  llms:
    mediaType: "text/plain"
    baseName: "llms"
    isPlainText: true
    notAlternative: true
  llms-full:
    mediaType: "text/plain"
    baseName: "llms-full"
    isPlainText: true
    notAlternative: true

outputs:
  home:
    - HTML
    - RSS
    - JSON
    - llms
    - llms-full

params:
  env: production
  title: "Zakaria Laabsi"
  description: "Deep-dives on post-quantum cryptography, reasoning models, reinforcement learning, and applied mathematics."
  author: "Zakaria Laabsi"
  keywords:
    - post-quantum cryptography
    - reinforcement learning
    - reasoning models
    - combinatorial game theory
    - applied mathematics
    - machine learning
    - AI research
    - embeddings quantization
  images:
    - "/images/og-V121.png"
  schema:
    publisherType: "Person"
  defaultTheme: light
  disableThemeToggle: false
  ShowReadingTime: true
  ShowShareButtons: false
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowWordCount: false
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true
  disableSpecial1stPost: false
  disableScrollToTop: false
  hidemeta: false
  hideSummary: false
  showtoc: true
  tocopen: true

  homeInfoParams:
    Title: "Zakaria Laabsi"
    Content: "Notes on AI & mathematics"

  socialIcons:
    - name: github
      url: "https://github.com/zlaabsi"
    - name: x
      url: "https://x.com/ZakShark"
    - name: email
      url: "mailto:zakaria.laabsi@gmail.com"
    - name: rss
      url: "/index.xml"

  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    keys: ["title", "permalink", "summary", "content"]

  assets:
    favicon: "/favicon.ico"
    disableFingerprinting: false

markup:
  goldmark:
    renderer:
      unsafe: true
    extensions:
      passthrough:
        delimiters:
          block:
            - - "$$"
              - "$$"
            - - "\\["
              - "\\]"
          inline:
            - - "$"
              - "$"
            - - "\\("
              - "\\)"
        enable: true
  highlight:
    noClasses: false
    style: dracula

menu:
  main:
    - identifier: posts
      name: Posts
      url: /posts/
      weight: 10
    - identifier: projects
      name: Projects
      url: /projects/
      weight: 20
    - identifier: about
      name: About
      url: /about/
      weight: 30
    - identifier: tags
      name: Tags
      url: /tags/
      weight: 40
    - identifier: archives
      name: Archives
      url: /archives/
      weight: 50
    - identifier: search
      name: Search
      url: /search/
      weight: 60
