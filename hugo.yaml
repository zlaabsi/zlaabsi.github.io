baseURL: "https://zlaabsi.github.io/"
languageCode: en-us
title: "Zakaria Laabsi"
pagination:
  pagerSize: 10
theme: PaperMod

enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false

minify:
  disableXML: true
  minifyOutput: true

outputs:
  home:
    - HTML
    - RSS
    - JSON

params:
  env: production
  title: "Zakaria Laabsi"
  description: "Deep-dives on post-quantum cryptography, reasoning models, reinforcement learning, and applied mathematics."
  author: "Zakaria Laabsi"
  defaultTheme: light
  disableThemeToggle: false
  ShowReadingTime: true
  ShowShareButtons: false
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowWordCount: false
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true
  disableSpecial1stPost: false
  disableScrollToTop: false
  hidemeta: false
  hideSummary: false
  showtoc: true
  tocopen: true

  homeInfoParams:
    Title: "Zakaria Laabsi"
    Content: "Notes on AI, cryptography & mathematics"

  socialIcons:
    - name: github
      url: "https://github.com/zlaabsi"
    - name: x
      url: "https://x.com/ZakShark"
    - name: email
      url: "mailto:zakaria.laabsi@gmail.com"
    - name: rss
      url: "/index.xml"

  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    keys: ["title", "permalink", "summary", "content"]

  assets:
    favicon: "/favicon.ico"
    disableFingerprinting: false

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false
    style: dracula

menu:
  main:
    - identifier: posts
      name: Posts
      url: /posts/
      weight: 10
    - identifier: projects
      name: Projects
      url: /projects/
      weight: 20
    - identifier: about
      name: About
      url: /about/
      weight: 30
    - identifier: tags
      name: Tags
      url: /tags/
      weight: 40
    - identifier: archives
      name: Archives
      url: /archives/
      weight: 50
    - identifier: search
      name: Search
      url: /search/
      weight: 60
