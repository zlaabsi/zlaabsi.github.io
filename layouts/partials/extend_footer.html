<!-- ASCII background video (rotating, persists across page navigations) -->
<video class="ascii-bg-video" muted playsinline preload="none">
  <source src="/videos/ascii-bg.mp4" type="video/mp4">
</video>
<script>
(function () {
  var video = document.querySelector('.ascii-bg-video');
  if (!video) return;
  if (window.matchMedia('(max-width: 768px)').matches) return;

  var sources = ['/videos/ascii-bg.mp4', '/videos/ascii-bg-2.mp4'{{ if ne .Kind "page" }}, '/videos/ascii-bg-3.mp4'{{ end }}];
  var KEY = 'ascii-bg';

  // Restore state from previous page
  var saved = JSON.parse(sessionStorage.getItem(KEY) || 'null');
  var current = saved ? saved.index : 0;
  var resumeTime = saved ? saved.time : 0;

  video.src = sources[current];

  function startVideo() {
    if (resumeTime > 0) {
      video.currentTime = resumeTime;
      resumeTime = 0;
    }
    video.play().catch(function () {});
  }

  video.addEventListener('ended', function () {
    current = (current + 1) % sources.length;
    video.src = sources[current];
    video.play();
  });

  // Save state before navigating away
  window.addEventListener('beforeunload', function () {
    sessionStorage.setItem(KEY, JSON.stringify({
      index: current,
      time: video.currentTime
    }));
  });

  // Load immediately if restoring, otherwise defer
  if (saved) {
    video.preload = 'auto';
    video.addEventListener('canplaythrough', startVideo, { once: true });
    video.load();
  } else if ('requestIdleCallback' in window) {
    requestIdleCallback(function () {
      video.preload = 'auto';
      video.addEventListener('canplaythrough', startVideo, { once: true });
      video.load();
    });
  } else {
    setTimeout(function () {
      video.preload = 'auto';
      video.addEventListener('canplaythrough', startVideo, { once: true });
      video.load();
    }, 2000);
  }
})();
</script>

<!-- Image lightbox -->
<script>
(function () {
  var container = document.querySelector('.post-content');
  if (!container) return;

  var overlay = document.createElement('div');
  overlay.className = 'lightbox-overlay';
  document.body.appendChild(overlay);

  function openImg(src, alt) {
    overlay.innerHTML = '<img src="' + src + '" alt="">'
      + (alt ? '<div class="lightbox-caption">' + alt + '</div>' : '');
    overlay.offsetHeight;
    overlay.classList.add('active');
    document.body.style.overflow = 'hidden';
  }

  function openVideo(videoEl, captionText) {
    var clone = videoEl.cloneNode(true);
    clone.controls = true;
    clone.autoplay = true;
    clone.muted = false;
    clone.loop = true;
    // styling handled by CSS .lightbox-overlay video
    overlay.innerHTML = '';
    overlay.appendChild(clone);
    if (captionText) {
      var cap = document.createElement('div');
      cap.className = 'lightbox-caption';
      cap.textContent = captionText;
      overlay.appendChild(cap);
    }
    overlay.offsetHeight;
    overlay.classList.add('active');
    document.body.style.overflow = 'hidden';
  }

  function close() {
    overlay.classList.remove('active');
    document.body.style.overflow = '';
    setTimeout(function () {
      var v = overlay.querySelector('video');
      if (v) v.pause();
      overlay.innerHTML = '';
    }, 200);
  }

  container.addEventListener('click', function (e) {
    // Handle images
    var img = e.target.closest('img');
    if (img) {
      var caption = '';
      var fig = img.closest('figure');
      if (fig) {
        var fc = fig.querySelector('figcaption');
        if (fc) caption = fc.textContent;
      }
      openImg(img.src, caption || img.alt);
      return;
    }
    // Handle videos
    var video = e.target.closest('video');
    if (video) {
      var caption = '';
      var fig = video.closest('figure') || video.closest('.post-video');
      if (fig) {
        var fc = fig.querySelector('figcaption');
        if (fc) caption = fc.textContent;
      }
      openVideo(video, caption);
      return;
    }
  });

  overlay.addEventListener('click', close);

  document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape' && overlay.classList.contains('active')) close();
  });
})();
</script>

<!-- Review: spatial grid overlay (localhost or ?grid=1). Does not affect Manim assets. Toggle: G -->
<style>
  #review-grid-overlay {
    position: fixed;
    inset: 0;
    z-index: 99997;
    pointer-events: none;
    display: none;
    --rg-line: rgba(220, 60, 60, 0.45);
    --rg-label: rgba(255, 220, 120, 0.95);
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 11px;
    line-height: 1;
  }
  #review-grid-overlay.is-visible { display: block; }
  #review-grid-overlay.rg-fine {
    --rg-cols: 8;
    --rg-rows: 8;
  }
  #review-grid-overlay:not(.rg-fine) {
    --rg-cols: 4;
    --rg-rows: 4;
  }
  .rg-layer {
    position: absolute;
    inset: 0;
    display: grid;
    grid-template-columns: repeat(var(--rg-cols), 1fr);
    grid-template-rows: repeat(var(--rg-rows), 1fr);
  }
  .rg-cell {
    border: 1px solid var(--rg-line);
    box-sizing: border-box;
    position: relative;
    color: var(--rg-label);
    text-shadow: 0 0 4px #000, 0 0 8px #000;
    padding: 3px 5px;
  }
  .rg-cell span {
    opacity: 0.92;
  }
  #review-grid-edges {
    position: absolute;
    inset: 0;
    border: 2px solid rgba(120, 200, 255, 0.35);
    box-sizing: border-box;
  }
  .rg-tick-h, .rg-tick-v {
    position: absolute;
    color: rgba(180, 230, 255, 0.85);
    text-shadow: 0 0 3px #000;
    font-size: 10px;
  }
  .rg-tick-h { bottom: 2px; transform: translateX(-50%); }
  .rg-tick-v { left: 2px; transform: translateY(-50%); }
</style>
<script>
(function () {
  var params = new URLSearchParams(location.search);
  var hostOk = /^(127\.0\.0\.1|localhost)$/.test(location.hostname);
  if (!hostOk && params.get('grid') !== '1') return;

  var root = document.createElement('div');
  root.id = 'review-grid-overlay';
  root.setAttribute('aria-hidden', 'true');

  var edges = document.createElement('div');
  edges.id = 'review-grid-edges';
  root.appendChild(edges);

  var layer = document.createElement('div');
  layer.className = 'rg-layer';
  root.appendChild(layer);

  var ROWS = ['A', 'B', 'C', 'D', 'E', 'F', 'G', 'H'];

  function buildCells(fine) {
    layer.innerHTML = '';
    var n = fine ? 8 : 4;
    for (var r = 0; r < n; r++) {
      for (var c = 0; c < n; c++) {
        var cell = document.createElement('div');
        cell.className = 'rg-cell';
        var lab = document.createElement('span');
        lab.textContent = ROWS[r] + (c + 1);
        cell.appendChild(lab);
        layer.appendChild(cell);
      }
    }
  }

  function edgeTicks() {
    edges.querySelectorAll('.rg-tick-h, .rg-tick-v').forEach(function (n) { n.remove(); });
    var pct = [0, 25, 50, 75, 100];
    pct.forEach(function (p) {
      var h = document.createElement('div');
      h.className = 'rg-tick-h';
      h.style.left = p + '%';
      h.textContent = p + '%';
      edges.appendChild(h);
      var v = document.createElement('div');
      v.className = 'rg-tick-v';
      v.style.top = p + '%';
      v.textContent = p + '%';
      edges.appendChild(v);
    });
  }

  var fine = sessionStorage.getItem('reviewGridFine') === '1';
  function applyFine() {
    root.classList.toggle('rg-fine', fine);
    buildCells(fine);
    edgeTicks();
    sessionStorage.setItem('reviewGridFine', fine ? '1' : '0');
  }
  applyFine();

  var visible = params.get('grid') === '1' || sessionStorage.getItem('reviewGridVisible') === '1';
  function setVisible(v) {
    visible = v;
    root.classList.toggle('is-visible', visible);
    sessionStorage.setItem('reviewGridVisible', visible ? '1' : '0');
  }
  setVisible(visible);

  document.body.appendChild(root);

  if (hostOk || params.get('grid') === '1') {
    console.info('[Review grid] g = show/hide, Shift+g = toggle 4×4 / 8×8, ?grid=1 = visible on load');
  }

  document.addEventListener('keydown', function (e) {
    var t = e.target;
    if (t && (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA' || t.isContentEditable)) return;
    if (e.key === 'g' || e.key === 'G') {
      if (e.shiftKey) {
        fine = !fine;
        applyFine();
      } else {
        setVisible(!visible);
      }
      e.preventDefault();
    }
  }, true);
})();
</script>

<!-- Mermaid -->
<script>
  document.addEventListener("DOMContentLoaded", function () {
    const mermaidBlocks = document.querySelectorAll("code.language-mermaid");
    if (mermaidBlocks.length > 0) {
      const script = document.createElement("script");
      script.src = "https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js";
      script.onload = function () {
        mermaid.initialize({
          startOnLoad: false,
          theme: document.body.classList.contains("dark") ? "dark" : "default",
        });
        mermaidBlocks.forEach(function (block) {
          const container = block.parentElement;
          const div = document.createElement("div");
          div.className = "mermaid";
          div.textContent = block.textContent;
          container.parentElement.replaceChild(div, container);
        });
        mermaid.run();
      };
      document.body.appendChild(script);
    }
  });
</script>

<!-- Runnable Python blocks -->
<script>
(function () {
  var runners = document.querySelectorAll('.python-runner');
  if (!runners.length) return;

  var pyodideVersion = '0.29.3';
  var pyodideIndexURL = 'https://cdn.jsdelivr.net/pyodide/v' + pyodideVersion + '/full/';
  var pyodideReady = null;

  function loadScript(src) {
    return new Promise(function (resolve, reject) {
      var existing = document.querySelector('script[data-pyodide-loader]');
      if (existing) {
        existing.addEventListener('load', function () { resolve(); }, { once: true });
        existing.addEventListener('error', reject, { once: true });
        if (window.loadPyodide) resolve();
        return;
      }
      var script = document.createElement('script');
      script.src = src;
      script.async = true;
      script.dataset.pyodideLoader = 'true';
      script.onload = function () { resolve(); };
      script.onerror = reject;
      document.body.appendChild(script);
    });
  }

  async function ensurePyodide() {
    if (window.__sitePyodide) return window.__sitePyodide;
    if (!pyodideReady) {
      pyodideReady = (async function () {
        if (!window.loadPyodide) {
          await loadScript(pyodideIndexURL + 'pyodide.js');
        }
        var pyodide = await window.loadPyodide({ indexURL: pyodideIndexURL });
        window.__sitePyodide = pyodide;
        return pyodide;
      })();
    }
    return pyodideReady;
  }

  function setStatus(runner, text) {
    var node = runner.querySelector('.python-runner__status');
    if (node) node.textContent = text || '';
  }

  function setOutput(runner, text, opts) {
    var node = runner.querySelector('.python-runner__output');
    if (!node) return;
    var options = opts || {};
    node.textContent = text;
    node.classList.toggle('is-empty', !!options.empty);
    node.classList.toggle('is-error', !!options.error);
  }

  function decodeBase64Unicode(value) {
    if (!value) return '';
    var bytes = Uint8Array.from(atob(value), function (char) {
      return char.charCodeAt(0);
    });
    return new TextDecoder().decode(bytes);
  }

  async function executePython(code) {
    var pyodide = await ensurePyodide();
    pyodide.globals.set('__site_user_code', code);
    try {
      return pyodide.runPython(`
import contextlib
import io
import traceback

_ns = {"__name__": "__main__"}
_stdout = io.StringIO()
_stderr = io.StringIO()

with contextlib.redirect_stdout(_stdout), contextlib.redirect_stderr(_stderr):
    try:
        exec(__site_user_code, _ns)
    except Exception:
        traceback.print_exc()

_stdout.getvalue() + _stderr.getvalue()
      `);
    } finally {
      pyodide.globals.delete('__site_user_code');
    }
  }

  runners.forEach(function (runner) {
    var runButton = runner.querySelector('.python-runner__run');
    var clearButton = runner.querySelector('.python-runner__clear');
    var source = runner.querySelector('.python-runner__source');
    var initialCode = source ? decodeBase64Unicode(source.dataset.code || '') : '';
    var idleText = 'Click Run to execute this example in your browser.';

    if (!runButton || !clearButton || !initialCode) return;

    clearButton.addEventListener('click', function () {
      setStatus(runner, '');
      setOutput(runner, idleText, { empty: true });
    });

    runButton.addEventListener('click', async function () {
      runButton.disabled = true;
      setStatus(runner, window.__sitePyodide ? 'Running...' : 'Loading Python runtime...');
      setOutput(runner, 'Running...', { empty: true });

      try {
        var output = await executePython(initialCode);
        var trimmed = (output || '').replace(/\s+$/, '');
        if (trimmed) {
          setOutput(runner, trimmed, { empty: false, error: false });
        } else {
          setOutput(runner, '(no output)', { empty: true, error: false });
        }
        setStatus(runner, 'Done');
      } catch (err) {
        var message = err && err.message ? err.message : String(err);
        setOutput(runner, message, { empty: false, error: true });
        setStatus(runner, 'Execution failed');
      } finally {
        runButton.disabled = false;
      }
    });
  });
})();
</script>
