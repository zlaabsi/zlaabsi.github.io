<text x="40" y="395" text-anchor="start" font-family="'JetBrains Mono', monospace" font-size="10" class="txt-sec" fill="#6B705C" font-weight="normal" font-style="normal">1. node 0: terminal ⇒ γ = 0</text>
<text x="40" y="412" text-anchor="start" font-family="'JetBrains Mono', monospace" font-size="10" class="txt-sec" fill="#6B705C" font-weight="normal" font-style="normal">2. node 1: mex{γ(0)} = mex{0} = 1</text>
<text x="40" y="429" text-anchor="start" font-family="'JetBrains Mono', monospace" font-size="10" class="txt-sec" fill="#6B705C" font-weight="normal" font-style="normal">3. node 2: mex{γ(0)} = mex{0} = 1</text>
<text x="40" y="446" text-anchor="start" font-family="'JetBrains Mono', monospace" font-size="10" class="txt-sec" fill="#6B705C" font-weight="normal" font-style="normal">4. node 3: mex{γ(1),γ(2)} = mex{1} = 0</text>
<text x="40" y="463" text-anchor="start" font-family="'JetBrains Mono', monospace" font-size="10" class="txt-sec" fill="#6B705C" font-weight="normal" font-style="normal">5. node 4: mex{γ(1),γ(3)} = mex{1,0} = 2</text>
<text x="40" y="480" text-anchor="start" font-family="'JetBrains Mono', monospace" font-size="10" class="txt-sec" fill="#6B705C" font-weight="normal" font-style="normal">6. node 5: mex{γ(0),γ(4)} = mex{0,2} = 1</text>
