<svg xmlns="http://www.w3.org/2000/svg" width="680" height="400" viewBox="0 0 680 400">
  <!-- Grundy values on a DAG -->
  <defs>
    <marker id="arrow-g" markerWidth="9" markerHeight="6" refX="8.5" refY="3" orient="auto" markerUnits="strokeWidth">
      <polygon points="0 0, 9 3, 0 6" fill="#2C2418"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="340" y="25" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#2C2418" font-weight="bold">
    Valeurs de Grundy sur un graphe de jeu acyclique
  </text>

  <!-- DAG structure (8 nodes):
       Level 0 (top):    A(gamma=2)      B(gamma=1)
       Level 1:          C(gamma=1)      D(gamma=0)     E(gamma=2)
       Level 2:          F(gamma=0)      G(gamma=1)
       Level 3 (bottom): H(gamma=0)

       Edges: A->C, A->D, A->E, B->D, B->E, C->F, C->G, D->H, E->G, E->H, F->H, G->H
  -->

  <!-- ===== EDGES (drawn first, under nodes) ===== -->
  <!-- A -> C -->
  <line x1="170" y1="82" x2="120" y2="148" stroke="#2C2418" stroke-width="1.5" marker-end="url(#arrow-g)"/>
  <!-- A -> D -->
  <line x1="185" y1="88" x2="310" y2="148" stroke="#2C2418" stroke-width="1.5" marker-end="url(#arrow-g)"/>
  <!-- A -> E -->
  <line x1="195" y1="85" x2="490" y2="148" stroke="#2C2418" stroke-width="1.5" marker-end="url(#arrow-g)"/>
  <!-- B -> D -->
  <line x1="470" y1="85" x2="335" y2="148" stroke="#2C2418" stroke-width="1.5" marker-end="url(#arrow-g)"/>
  <!-- B -> E -->
  <line x1="490" y1="88" x2="502" y2="148" stroke="#2C2418" stroke-width="1.5" marker-end="url(#arrow-g)"/>
  <!-- C -> F -->
  <line x1="105" y1="180" x2="175" y2="248" stroke="#2C2418" stroke-width="1.5" marker-end="url(#arrow-g)"/>
  <!-- C -> G -->
  <line x1="118" y1="182" x2="395" y2="248" stroke="#2C2418" stroke-width="1.5" marker-end="url(#arrow-g)"/>
  <!-- D -> H -->
  <line x1="320" y1="182" x2="320" y2="318" stroke="#2C2418" stroke-width="1.5" marker-end="url(#arrow-g)"/>
  <!-- E -> G -->
  <line x1="492" y1="180" x2="418" y2="248" stroke="#2C2418" stroke-width="1.5" marker-end="url(#arrow-g)"/>
  <!-- E -> H -->
  <line x1="502" y1="182" x2="338" y2="318" stroke="#2C2418" stroke-width="1.5" marker-end="url(#arrow-g)"/>
  <!-- F -> H -->
  <line x1="190" y1="282" x2="305" y2="328" stroke="#2C2418" stroke-width="1.5" marker-end="url(#arrow-g)"/>
  <!-- G -> H -->
  <line x1="405" y1="282" x2="338" y2="318" stroke="#2C2418" stroke-width="1.5" marker-end="url(#arrow-g)"/>

  <!-- ===== NODES ===== -->

  <!-- Node A: gamma=2, N-position (warm red) -->
  <circle cx="185" cy="70" r="20" fill="#A0522D" fill-opacity="0.2" stroke="#A0522D" stroke-width="2"/>
  <text x="185" y="76" text-anchor="middle" font-family="Georgia, serif" font-size="15" fill="#2C2418" font-weight="bold">A</text>
  <text x="215" y="60" text-anchor="start" font-family="Georgia, serif" font-size="13" fill="#A0522D" font-weight="bold">&#947; = 2</text>

  <!-- Node B: gamma=1, N-position -->
  <circle cx="485" cy="70" r="20" fill="#A0522D" fill-opacity="0.2" stroke="#A0522D" stroke-width="2"/>
  <text x="485" y="76" text-anchor="middle" font-family="Georgia, serif" font-size="15" fill="#2C2418" font-weight="bold">B</text>
  <text x="515" y="60" text-anchor="start" font-family="Georgia, serif" font-size="13" fill="#A0522D" font-weight="bold">&#947; = 1</text>

  <!-- Node C: gamma=1, N-position -->
  <circle cx="105" cy="165" r="20" fill="#A0522D" fill-opacity="0.2" stroke="#A0522D" stroke-width="2"/>
  <text x="105" y="171" text-anchor="middle" font-family="Georgia, serif" font-size="15" fill="#2C2418" font-weight="bold">C</text>
  <text x="68" y="158" text-anchor="end" font-family="Georgia, serif" font-size="13" fill="#A0522D" font-weight="bold">&#947; = 1</text>

  <!-- Node D: gamma=0, P-position (green) -->
  <circle cx="325" cy="165" r="20" fill="#6B705C" fill-opacity="0.2" stroke="#6B705C" stroke-width="2"/>
  <text x="325" y="171" text-anchor="middle" font-family="Georgia, serif" font-size="15" fill="#2C2418" font-weight="bold">D</text>
  <text x="355" y="158" text-anchor="start" font-family="Georgia, serif" font-size="13" fill="#6B705C" font-weight="bold">&#947; = 0</text>

  <!-- Node E: gamma=2, N-position -->
  <circle cx="505" cy="165" r="20" fill="#A0522D" fill-opacity="0.2" stroke="#A0522D" stroke-width="2"/>
  <text x="505" y="171" text-anchor="middle" font-family="Georgia, serif" font-size="15" fill="#2C2418" font-weight="bold">E</text>
  <text x="535" y="158" text-anchor="start" font-family="Georgia, serif" font-size="13" fill="#A0522D" font-weight="bold">&#947; = 2</text>

  <!-- Node F: gamma=0, P-position (green) -->
  <circle cx="185" cy="265" r="20" fill="#6B705C" fill-opacity="0.2" stroke="#6B705C" stroke-width="2"/>
  <text x="185" y="271" text-anchor="middle" font-family="Georgia, serif" font-size="15" fill="#2C2418" font-weight="bold">F</text>
  <text x="148" y="258" text-anchor="end" font-family="Georgia, serif" font-size="13" fill="#6B705C" font-weight="bold">&#947; = 0</text>

  <!-- Node G: gamma=1, N-position -->
  <circle cx="410" cy="265" r="20" fill="#A0522D" fill-opacity="0.2" stroke="#A0522D" stroke-width="2"/>
  <text x="410" y="271" text-anchor="middle" font-family="Georgia, serif" font-size="15" fill="#2C2418" font-weight="bold">G</text>
  <text x="440" y="258" text-anchor="start" font-family="Georgia, serif" font-size="13" fill="#A0522D" font-weight="bold">&#947; = 1</text>

  <!-- Node H: gamma=0, terminal P-position (green) -->
  <circle cx="325" cy="340" r="20" fill="#6B705C" fill-opacity="0.25" stroke="#6B705C" stroke-width="2.5"/>
  <text x="325" y="346" text-anchor="middle" font-family="Georgia, serif" font-size="15" fill="#2C2418" font-weight="bold">H</text>
  <text x="355" y="335" text-anchor="start" font-family="Georgia, serif" font-size="13" fill="#6B705C" font-weight="bold">&#947; = 0</text>
  <text x="355" y="352" text-anchor="start" font-family="Georgia, serif" font-size="11" fill="#6B705C" font-style="italic">(terminal)</text>

  <!-- Legend -->
  <g transform="translate(30, 375)">
    <circle cx="0" cy="0" r="8" fill="#6B705C" fill-opacity="0.2" stroke="#6B705C" stroke-width="1.5"/>
    <text x="14" y="4" font-family="Georgia, serif" font-size="12" fill="#2C2418">P-position (&#947; = 0, perdant)</text>
    <circle cx="230" cy="0" r="8" fill="#A0522D" fill-opacity="0.2" stroke="#A0522D" stroke-width="1.5"/>
    <text x="244" y="4" font-family="Georgia, serif" font-size="12" fill="#2C2418">N-position (&#947; &#8800; 0, gagnant)</text>
    <text x="465" y="4" font-family="Georgia, serif" font-size="12" fill="#6B705C" font-style="italic">&#947;(x) = mex{&#947;(y) : x &#8594; y}</text>
  </g>
</svg>