<svg xmlns="http://www.w3.org/2000/svg" width="700" height="380" viewBox="0 0 700 380">
  <!-- Kernel Examples: 4 small directed graphs -->
  <defs>
    <marker id="arrow-k" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2C2418"/>
    </marker>
  </defs>

  <!-- ============ (a) {1,6} stable but not absorbant ============ -->
  <g transform="translate(10, 20)">
    <text x="75" y="0" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#2C2418" font-weight="bold">(a) S = {1, 6}</text>
    <text x="75" y="16" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#6B705C">stable, pas absorbant</text>

    <!-- Nodes: 6 nodes arranged in 2 rows of 3 -->
    <!-- Row 1: 1, 2, 3   Row 2: 4, 5, 6 -->
    <!-- Node 1 (kernel) -->
    <circle cx="25" cy="75" r="18" fill="#B8860B" fill-opacity="0.3" stroke="#B8860B" stroke-width="2"/>
    <text x="25" y="80" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#2C2418" font-weight="bold">1</text>
    <!-- Node 2 -->
    <circle cx="75" cy="75" r="18" fill="white" stroke="#2C2418" stroke-width="1.5"/>
    <text x="75" y="80" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#2C2418">2</text>
    <!-- Node 3 -->
    <circle cx="125" cy="75" r="18" fill="white" stroke="#2C2418" stroke-width="1.5"/>
    <text x="125" y="80" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#2C2418">3</text>
    <!-- Node 4 -->
    <circle cx="25" cy="145" r="18" fill="white" stroke="#2C2418" stroke-width="1.5"/>
    <text x="25" y="150" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#2C2418">4</text>
    <!-- Node 5 -->
    <circle cx="75" cy="145" r="18" fill="white" stroke="#2C2418" stroke-width="1.5"/>
    <text x="75" y="150" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#2C2418">5</text>
    <!-- Node 6 (kernel) -->
    <circle cx="125" cy="145" r="18" fill="#B8860B" fill-opacity="0.3" stroke="#B8860B" stroke-width="2"/>
    <text x="125" y="150" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#2C2418" font-weight="bold">6</text>

    <!-- Edges: stable means no arc between 1 and 6 -->
    <!-- 1 -> 3 -->
    <line x1="43" y1="75" x2="107" y2="75" stroke="#2C2418" stroke-width="1.5" marker-end="url(#arrow-k)"/>
    <!-- 3 -> 6 -->
    <line x1="130" y1="93" x2="130" y2="127" stroke="#2C2418" stroke-width="1.5" marker-end="url(#arrow-k)"/>
    <!-- 4 -> 1 -->
    <line x1="25" y1="127" x2="25" y2="93" stroke="#2C2418" stroke-width="1.5" marker-end="url(#arrow-k)"/>
    <!-- 5 -> 4 -->
    <line x1="57" y1="145" x2="43" y2="145" stroke="#2C2418" stroke-width="1.5" marker-end="url(#arrow-k)"/>
    <!-- 6 -> 5 -->
    <line x1="107" y1="145" x2="93" y2="145" stroke="#2C2418" stroke-width="1.5" marker-end="url(#arrow-k)"/>

    <!-- Problem: node 2 has no successor in {1,6} => not absorbant -->
    <!-- 2 -> 5 -->
    <line x1="75" y1="93" x2="75" y2="127" stroke="#2C2418" stroke-width="1.5" marker-end="url(#arrow-k)"/>

    <!-- Annotation for node 2 -->
    <text x="75" y="195" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#A0522D" font-style="italic">2 n'atteint pas {1,6}</text>
  </g>

  <!-- ============ (b) {1,2,3} absorbant but not stable ============ -->
  <g transform="translate(180, 20)">
    <text x="75" y="0" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#2C2418" font-weight="bold">(b) S = {1, 2, 3}</text>
    <text x="75" y="16" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#6B705C">absorbant, pas stable</text>

    <!-- Nodes arranged in triangle + extras -->
    <!-- Node 1 (kernel-candidate) -->
    <circle cx="25" cy="75" r="18" fill="#B8860B" fill-opacity="0.3" stroke="#B8860B" stroke-width="2"/>
    <text x="25" y="80" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#2C2418" font-weight="bold">1</text>
    <!-- Node 2 (kernel-candidate) -->
    <circle cx="125" cy="75" r="18" fill="#B8860B" fill-opacity="0.3" stroke="#B8860B" stroke-width="2"/>
    <text x="125" y="80" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#2C2418" font-weight="bold">2</text>
    <!-- Node 3 (kernel-candidate) -->
    <circle cx="75" cy="145" r="18" fill="#B8860B" fill-opacity="0.3" stroke="#B8860B" stroke-width="2"/>
    <text x="75" y="150" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#2C2418" font-weight="bold">3</text>
    <!-- Node 4 -->
    <circle cx="25" cy="145" r="18" fill="white" stroke="#2C2418" stroke-width="1.5"/>
    <text x="25" y="150" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#2C2418">4</text>
    <!-- Node 5 -->
    <circle cx="125" cy="145" r="18" fill="white" stroke="#2C2418" stroke-width="1.5"/>
    <text x="125" y="150" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#2C2418">5</text>
    <!-- Node 6 -->
    <circle cx="75" cy="75" r="18" fill="white" stroke="#2C2418" stroke-width="1.5"/>
    <text x="75" y="80" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#2C2418">6</text>

    <!-- Arc from 1 -> 2 (makes it NOT stable!) shown in red -->
    <line x1="43" y1="72" x2="107" y2="72" stroke="#A0522D" stroke-width="2" marker-end="url(#arrow-k)"/>

    <!-- Other arcs to make it absorbant -->
    <!-- 4 -> 1 -->
    <line x1="25" y1="127" x2="25" y2="93" stroke="#2C2418" stroke-width="1.5" marker-end="url(#arrow-k)"/>
    <!-- 5 -> 3 -->
    <line x1="111" y1="153" x2="93" y2="150" stroke="#2C2418" stroke-width="1.5" marker-end="url(#arrow-k)"/>
    <!-- 6 -> 2 -->
    <line x1="90" y1="79" x2="107" y2="77" stroke="#2C2418" stroke-width="1.5" marker-end="url(#arrow-k)"/>

    <!-- Annotation -->
    <text x="75" y="195" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#A0522D" font-style="italic">arc 1→2 : pas stable</text>
  </g>

  <!-- ============ (c) {2,6} is a kernel ============ -->
  <g transform="translate(350, 20)">
    <text x="75" y="0" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#2C2418" font-weight="bold">(c) K = {2, 6}</text>
    <text x="75" y="16" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#6B705C">noyau (stable + absorbant)</text>

    <!-- 6 nodes: 1,2,3 top row; 4,5,6 bottom row -->
    <!-- Node 1 -->
    <circle cx="25" cy="75" r="18" fill="white" stroke="#2C2418" stroke-width="1.5"/>
    <text x="25" y="80" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#2C2418">1</text>
    <!-- Node 2 (kernel) -->
    <circle cx="75" cy="75" r="18" fill="#B8860B" fill-opacity="0.3" stroke="#B8860B" stroke-width="2"/>
    <text x="75" y="80" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#2C2418" font-weight="bold">2</text>
    <!-- Node 3 -->
    <circle cx="125" cy="75" r="18" fill="white" stroke="#2C2418" stroke-width="1.5"/>
    <text x="125" y="80" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#2C2418">3</text>
    <!-- Node 4 -->
    <circle cx="25" cy="145" r="18" fill="white" stroke="#2C2418" stroke-width="1.5"/>
    <text x="25" y="150" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#2C2418">4</text>
    <!-- Node 5 -->
    <circle cx="75" cy="145" r="18" fill="white" stroke="#2C2418" stroke-width="1.5"/>
    <text x="75" y="150" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#2C2418">5</text>
    <!-- Node 6 (kernel) -->
    <circle cx="125" cy="145" r="18" fill="#B8860B" fill-opacity="0.3" stroke="#B8860B" stroke-width="2"/>
    <text x="125" y="150" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#2C2418" font-weight="bold">6</text>

    <!-- Edges: 2 and 6 not connected (stable), everyone else reaches one of them (absorbant) -->
    <!-- 1 -> 2 -->
    <line x1="43" y1="75" x2="57" y2="75" stroke="#2C2418" stroke-width="1.5" marker-end="url(#arrow-k)"/>
    <!-- 3 -> 6 -->
    <line x1="130" y1="93" x2="130" y2="127" stroke="#2C2418" stroke-width="1.5" marker-end="url(#arrow-k)"/>
    <!-- 4 -> 2 -->
    <line x1="33" y1="128" x2="65" y2="93" stroke="#2C2418" stroke-width="1.5" marker-end="url(#arrow-k)"/>
    <!-- 5 -> 6 -->
    <line x1="93" y1="145" x2="107" y2="145" stroke="#2C2418" stroke-width="1.5" marker-end="url(#arrow-k)"/>
    <!-- 1 -> 4 -->
    <line x1="25" y1="93" x2="25" y2="127" stroke="#2C2418" stroke-width="1.5" marker-end="url(#arrow-k)"/>
    <!-- 3 -> 5 -->
    <line x1="117" y1="93" x2="83" y2="127" stroke="#2C2418" stroke-width="1.5" marker-end="url(#arrow-k)"/>
  </g>

  <!-- ============ (d) {3,6} is also a kernel ============ -->
  <g transform="translate(520, 20)">
    <text x="75" y="0" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#2C2418" font-weight="bold">(d) K = {3, 6}</text>
    <text x="75" y="16" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#6B705C">noyau (stable + absorbant)</text>

    <!-- Same graph structure as (c) but different kernel -->
    <!-- Node 1 -->
    <circle cx="25" cy="75" r="18" fill="white" stroke="#2C2418" stroke-width="1.5"/>
    <text x="25" y="80" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#2C2418">1</text>
    <!-- Node 2 -->
    <circle cx="75" cy="75" r="18" fill="white" stroke="#2C2418" stroke-width="1.5"/>
    <text x="75" y="80" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#2C2418">2</text>
    <!-- Node 3 (kernel) -->
    <circle cx="125" cy="75" r="18" fill="#B8860B" fill-opacity="0.3" stroke="#B8860B" stroke-width="2"/>
    <text x="125" y="80" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#2C2418" font-weight="bold">3</text>
    <!-- Node 4 -->
    <circle cx="25" cy="145" r="18" fill="white" stroke="#2C2418" stroke-width="1.5"/>
    <text x="25" y="150" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#2C2418">4</text>
    <!-- Node 5 -->
    <circle cx="75" cy="145" r="18" fill="white" stroke="#2C2418" stroke-width="1.5"/>
    <text x="75" y="150" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#2C2418">5</text>
    <!-- Node 6 (kernel) -->
    <circle cx="125" cy="145" r="18" fill="#B8860B" fill-opacity="0.3" stroke="#B8860B" stroke-width="2"/>
    <text x="125" y="150" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#2C2418" font-weight="bold">6</text>

    <!-- Edges: same graph, 3 and 6 not connected, all others reach {3,6} -->
    <!-- 1 -> 3 -->
    <line x1="43" y1="72" x2="107" y2="73" stroke="#2C2418" stroke-width="1.5" marker-end="url(#arrow-k)"/>
    <!-- 2 -> 3 -->
    <line x1="93" y1="75" x2="107" y2="75" stroke="#2C2418" stroke-width="1.5" marker-end="url(#arrow-k)"/>
    <!-- 4 -> 6 -->
    <line x1="40" y1="153" x2="107" y2="148" stroke="#2C2418" stroke-width="1.5" marker-end="url(#arrow-k)"/>
    <!-- 5 -> 6 -->
    <line x1="93" y1="145" x2="107" y2="145" stroke="#2C2418" stroke-width="1.5" marker-end="url(#arrow-k)"/>
    <!-- 1 -> 5 -->
    <line x1="33" y1="93" x2="67" y2="127" stroke="#2C2418" stroke-width="1.5" marker-end="url(#arrow-k)"/>
    <!-- 2 -> 4 -->
    <line x1="65" y1="93" x2="35" y2="127" stroke="#2C2418" stroke-width="1.5" marker-end="url(#arrow-k)"/>
  </g>

  <!-- Legend at bottom -->
  <g transform="translate(160, 260)">
    <circle cx="0" cy="0" r="10" fill="#B8860B" fill-opacity="0.3" stroke="#B8860B" stroke-width="2"/>
    <text x="18" y="5" font-family="Georgia, serif" font-size="13" fill="#2C2418">Sommet dans S (ou K)</text>
    <circle cx="210" cy="0" r="10" fill="white" stroke="#2C2418" stroke-width="1.5"/>
    <text x="228" y="5" font-family="Georgia, serif" font-size="13" fill="#2C2418">Sommet hors de S (ou K)</text>
  </g>

  <!-- Definitions reminder -->
  <g transform="translate(20, 320)">
    <text x="0" y="0" font-family="Georgia, serif" font-size="12" fill="#6B705C" font-style="italic">Stable : pas d'arc entre sommets de S</text>
    <text x="0" y="18" font-family="Georgia, serif" font-size="12" fill="#6B705C" font-style="italic">Absorbant : tout sommet hors de S a un successeur dans S</text>
    <text x="0" y="36" font-family="Georgia, serif" font-size="12" fill="#6B705C" font-style="italic">Noyau = stable + absorbant</text>
  </g>
</svg>