<svg xmlns="http://www.w3.org/2000/svg" width="650" height="280" viewBox="0 0 650 280">
  <!-- Nim Heaps: 1, 3, 5 objects -->

  <!-- Heap 1: 1 object -->
  <g transform="translate(120, 40)">
    <text x="0" y="0" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#2C2418" font-weight="bold">Heap 1</text>
    <text x="0" y="22" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#6B705C">(n₁ = 1)</text>
    <!-- Single object -->
    <circle cx="0" cy="190" r="16" fill="#B8860B" fill-opacity="0.25" stroke="#2C2418" stroke-width="1.8"/>
    <circle cx="0" cy="190" r="5" fill="#B8860B" fill-opacity="0.7"/>
    <!-- Base line -->
    <line x1="-30" y1="215" x2="30" y2="215" stroke="#2C2418" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Heap 2: 3 objects -->
  <g transform="translate(325, 40)">
    <text x="0" y="0" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#2C2418" font-weight="bold">Heap 2</text>
    <text x="0" y="22" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#6B705C">(n₂ = 3)</text>
    <!-- Row 1 (top): 1 object -->
    <circle cx="0" cy="120" r="16" fill="#B8860B" fill-opacity="0.25" stroke="#2C2418" stroke-width="1.8"/>
    <circle cx="0" cy="120" r="5" fill="#B8860B" fill-opacity="0.7"/>
    <!-- Row 2: 1 object -->
    <circle cx="0" cy="155" r="16" fill="#B8860B" fill-opacity="0.25" stroke="#2C2418" stroke-width="1.8"/>
    <circle cx="0" cy="155" r="5" fill="#B8860B" fill-opacity="0.7"/>
    <!-- Row 3 (bottom): 1 object -->
    <circle cx="0" cy="190" r="16" fill="#B8860B" fill-opacity="0.25" stroke="#2C2418" stroke-width="1.8"/>
    <circle cx="0" cy="190" r="5" fill="#B8860B" fill-opacity="0.7"/>
    <!-- Base line -->
    <line x1="-30" y1="215" x2="30" y2="215" stroke="#2C2418" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Heap 3: 5 objects -->
  <g transform="translate(530, 40)">
    <text x="0" y="0" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#2C2418" font-weight="bold">Heap 3</text>
    <text x="0" y="22" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#6B705C">(n₃ = 5)</text>
    <!-- Row 1 (top): 1 object -->
    <circle cx="0" cy="50" r="16" fill="#B8860B" fill-opacity="0.25" stroke="#2C2418" stroke-width="1.8"/>
    <circle cx="0" cy="50" r="5" fill="#B8860B" fill-opacity="0.7"/>
    <!-- Row 2 -->
    <circle cx="0" cy="85" r="16" fill="#B8860B" fill-opacity="0.25" stroke="#2C2418" stroke-width="1.8"/>
    <circle cx="0" cy="85" r="5" fill="#B8860B" fill-opacity="0.7"/>
    <!-- Row 3 -->
    <circle cx="0" cy="120" r="16" fill="#B8860B" fill-opacity="0.25" stroke="#2C2418" stroke-width="1.8"/>
    <circle cx="0" cy="120" r="5" fill="#B8860B" fill-opacity="0.7"/>
    <!-- Row 4 -->
    <circle cx="0" cy="155" r="16" fill="#B8860B" fill-opacity="0.25" stroke="#2C2418" stroke-width="1.8"/>
    <circle cx="0" cy="155" r="5" fill="#B8860B" fill-opacity="0.7"/>
    <!-- Row 5 (bottom) -->
    <circle cx="0" cy="190" r="16" fill="#B8860B" fill-opacity="0.25" stroke="#2C2418" stroke-width="1.8"/>
    <circle cx="0" cy="190" r="5" fill="#B8860B" fill-opacity="0.7"/>
    <!-- Base line -->
    <line x1="-30" y1="215" x2="30" y2="215" stroke="#2C2418" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Bottom annotation -->
  <text x="325" y="268" text-anchor="middle" font-family="Georgia, serif" font-size="15" fill="#2C2418" font-style="italic">
    Position de Nim : (1, 3, 5)
  </text>
</svg>