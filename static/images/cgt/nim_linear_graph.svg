<svg xmlns="http://www.w3.org/2000/svg" width="700" height="250" viewBox="0 0 700 250">
  <!-- Nim linear graph: 9 -> 8 -> ... -> 0 with kernel {0, 4, 8} -->
  <defs>
    <marker id="arrow-nl" markerWidth="8" markerHeight="6" refX="7.5" refY="3" orient="auto" markerUnits="strokeWidth">
      <polygon points="0 0, 8 3, 0 6" fill="#2C2418"/>
    </marker>
    <marker id="arrow-nl-accent" markerWidth="8" markerHeight="6" refX="7.5" refY="3" orient="auto" markerUnits="strokeWidth">
      <polygon points="0 0, 8 3, 0 6" fill="#B8860B" fill-opacity="0.5"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="350" y="25" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#2C2418" font-weight="bold">
    Graphe linéaire de Nim (retrait de 1, 2 ou 3 jetons)
  </text>

  <!-- Nodes arranged left to right: 9, 8, 7, 6, 5, 4, 3, 2, 1, 0 -->
  <!-- Spacing: 68px apart, starting at x=45 -->

  <!-- Node 9 -->
  <circle cx="45" cy="100" r="20" fill="white" stroke="#2C2418" stroke-width="1.8"/>
  <text x="45" y="106" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#2C2418">9</text>

  <!-- Node 8 (kernel) -->
  <circle cx="113" cy="100" r="20" fill="#B8860B" fill-opacity="0.25" stroke="#B8860B" stroke-width="2.2"/>
  <text x="113" y="106" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#2C2418" font-weight="bold">8</text>

  <!-- Node 7 -->
  <circle cx="181" cy="100" r="20" fill="white" stroke="#2C2418" stroke-width="1.8"/>
  <text x="181" y="106" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#2C2418">7</text>

  <!-- Node 6 -->
  <circle cx="249" cy="100" r="20" fill="white" stroke="#2C2418" stroke-width="1.8"/>
  <text x="249" y="106" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#2C2418">6</text>

  <!-- Node 5 -->
  <circle cx="317" cy="100" r="20" fill="white" stroke="#2C2418" stroke-width="1.8"/>
  <text x="317" y="106" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#2C2418">5</text>

  <!-- Node 4 (kernel) -->
  <circle cx="385" cy="100" r="20" fill="#B8860B" fill-opacity="0.25" stroke="#B8860B" stroke-width="2.2"/>
  <text x="385" y="106" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#2C2418" font-weight="bold">4</text>

  <!-- Node 3 -->
  <circle cx="453" cy="100" r="20" fill="white" stroke="#2C2418" stroke-width="1.8"/>
  <text x="453" y="106" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#2C2418">3</text>

  <!-- Node 2 -->
  <circle cx="521" cy="100" r="20" fill="white" stroke="#2C2418" stroke-width="1.8"/>
  <text x="521" y="106" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#2C2418">2</text>

  <!-- Node 1 -->
  <circle cx="589" cy="100" r="20" fill="white" stroke="#2C2418" stroke-width="1.8"/>
  <text x="589" y="106" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#2C2418">1</text>

  <!-- Node 0 (kernel) -->
  <circle cx="657" cy="100" r="20" fill="#B8860B" fill-opacity="0.25" stroke="#B8860B" stroke-width="2.2"/>
  <text x="657" y="106" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#2C2418" font-weight="bold">0</text>

  <!-- Direct successor arrows (remove 1): straight line, each node -> next -->
  <line x1="65" y1="100" x2="93" y2="100" stroke="#2C2418" stroke-width="1.5" marker-end="url(#arrow-nl)"/>
  <line x1="133" y1="100" x2="161" y2="100" stroke="#2C2418" stroke-width="1.5" marker-end="url(#arrow-nl)"/>
  <line x1="201" y1="100" x2="229" y2="100" stroke="#2C2418" stroke-width="1.5" marker-end="url(#arrow-nl)"/>
  <line x1="269" y1="100" x2="297" y2="100" stroke="#2C2418" stroke-width="1.5" marker-end="url(#arrow-nl)"/>
  <line x1="337" y1="100" x2="365" y2="100" stroke="#2C2418" stroke-width="1.5" marker-end="url(#arrow-nl)"/>
  <line x1="405" y1="100" x2="433" y2="100" stroke="#2C2418" stroke-width="1.5" marker-end="url(#arrow-nl)"/>
  <line x1="473" y1="100" x2="501" y2="100" stroke="#2C2418" stroke-width="1.5" marker-end="url(#arrow-nl)"/>
  <line x1="541" y1="100" x2="569" y2="100" stroke="#2C2418" stroke-width="1.5" marker-end="url(#arrow-nl)"/>
  <line x1="609" y1="100" x2="637" y2="100" stroke="#2C2418" stroke-width="1.5" marker-end="url(#arrow-nl)"/>

  <!-- Remove 2: curved arcs skipping one node -->
  <path d="M 65,88 Q 113,52 161,88" fill="none" stroke="#6B705C" stroke-width="1.2" marker-end="url(#arrow-nl)" stroke-opacity="0.6"/>
  <path d="M 133,88 Q 181,52 229,88" fill="none" stroke="#6B705C" stroke-width="1.2" marker-end="url(#arrow-nl)" stroke-opacity="0.6"/>
  <path d="M 201,88 Q 249,52 297,88" fill="none" stroke="#6B705C" stroke-width="1.2" marker-end="url(#arrow-nl)" stroke-opacity="0.6"/>
  <path d="M 269,88 Q 317,52 365,88" fill="none" stroke="#6B705C" stroke-width="1.2" marker-end="url(#arrow-nl)" stroke-opacity="0.6"/>
  <path d="M 337,88 Q 385,52 433,88" fill="none" stroke="#6B705C" stroke-width="1.2" marker-end="url(#arrow-nl)" stroke-opacity="0.6"/>
  <path d="M 405,88 Q 453,52 501,88" fill="none" stroke="#6B705C" stroke-width="1.2" marker-end="url(#arrow-nl)" stroke-opacity="0.6"/>
  <path d="M 473,88 Q 521,52 569,88" fill="none" stroke="#6B705C" stroke-width="1.2" marker-end="url(#arrow-nl)" stroke-opacity="0.6"/>
  <path d="M 541,88 Q 589,52 637,88" fill="none" stroke="#6B705C" stroke-width="1.2" marker-end="url(#arrow-nl)" stroke-opacity="0.6"/>

  <!-- Remove 3: curved arcs skipping two nodes -->
  <path d="M 65,85 Q 147,35 229,85" fill="none" stroke="#6B705C" stroke-width="1.0" marker-end="url(#arrow-nl)" stroke-opacity="0.35"/>
  <path d="M 133,85 Q 215,35 297,85" fill="none" stroke="#6B705C" stroke-width="1.0" marker-end="url(#arrow-nl)" stroke-opacity="0.35"/>
  <path d="M 201,85 Q 283,35 365,85" fill="none" stroke="#6B705C" stroke-width="1.0" marker-end="url(#arrow-nl)" stroke-opacity="0.35"/>
  <path d="M 269,85 Q 351,35 433,85" fill="none" stroke="#6B705C" stroke-width="1.0" marker-end="url(#arrow-nl)" stroke-opacity="0.35"/>
  <path d="M 337,85 Q 419,35 501,85" fill="none" stroke="#6B705C" stroke-width="1.0" marker-end="url(#arrow-nl)" stroke-opacity="0.35"/>
  <path d="M 405,85 Q 487,35 569,85" fill="none" stroke="#6B705C" stroke-width="1.0" marker-end="url(#arrow-nl)" stroke-opacity="0.35"/>
  <path d="M 473,85 Q 555,35 637,85" fill="none" stroke="#6B705C" stroke-width="1.0" marker-end="url(#arrow-nl)" stroke-opacity="0.35"/>

  <!-- Kernel label -->
  <text x="350" y="175" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#B8860B" font-weight="bold">
    K = {0, 4, 8}
  </text>
  <text x="350" y="198" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#6B705C" font-style="italic">
    Positions perdantes (P-positions) : multiples de 4
  </text>

  <!-- Legend -->
  <g transform="translate(160, 225)">
    <line x1="0" y1="0" x2="25" y2="0" stroke="#2C2418" stroke-width="1.5" marker-end="url(#arrow-nl)"/>
    <text x="32" y="4" font-family="Georgia, serif" font-size="11" fill="#2C2418">retirer 1</text>
    <line x1="100" y1="0" x2="125" y2="0" stroke="#6B705C" stroke-width="1.2" stroke-opacity="0.6"/>
    <text x="132" y="4" font-family="Georgia, serif" font-size="11" fill="#6B705C">retirer 2</text>
    <line x1="200" y1="0" x2="225" y2="0" stroke="#6B705C" stroke-width="1.0" stroke-opacity="0.35"/>
    <text x="232" y="4" font-family="Georgia, serif" font-size="11" fill="#6B705C" fill-opacity="0.6">retirer 3</text>
  </g>
</svg>