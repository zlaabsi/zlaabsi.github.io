<svg xmlns="http://www.w3.org/2000/svg" width="700" height="480" viewBox="0 0 700 480">
<style>
  .dark .bg { fill: #111111; }
  .dark .txt { fill: #f0f0f0; }
  .dark .txt-sec { fill: #8B9A6B; }
  .dark .accent { fill: #D4A843; }
  .dark .accent-stroke { stroke: #D4A843; }
  .dark .sienna { fill: #C97A50; }
  .dark .sienna-stroke { stroke: #C97A50; }
  .dark .olive { fill: #8B9A6B; }
  .dark .olive-stroke { stroke: #8B9A6B; }
  .dark .border-stroke { stroke: #2a2a2a; }
  .dark .line { stroke: #f0f0f0; }
  .dark .line-light { stroke: #2a2a2a; }
  .dark .node-fill { fill: #111111; }
  .dark .node-stroke { stroke: #f0f0f0; }
  .dark .accent-bg { fill: #D4A843; fill-opacity: 0.2; }
  .dark .olive-bg { fill: #8B9A6B; fill-opacity: 0.2; }
  .dark .sienna-bg { fill: #C97A50; fill-opacity: 0.2; }
  .dark .marker-dark { fill: #f0f0f0; }
  .dark .marker-accent { fill: #D4A843; }
  .dark .marker-olive { fill: #8B9A6B; }
  .dark .marker-sienna { fill: #C97A50; }
  .dark .xor-bg { fill: #D4A843; fill-opacity: 0.12; }
  .dark .highlight-bg { fill: #D4A843; fill-opacity: 0.08; }
</style>
<defs>
  <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
    <polygon points="0 0, 8 3, 0 6" class="marker-dark" fill="#2C2418"/>
  </marker>
  <marker id="arr-accent" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
    <polygon points="0 0, 8 3, 0 6" class="marker-accent" fill="#B8860B"/>
  </marker>
  <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
    <feDropShadow dx="1" dy="1" stdDeviation="1.5" flood-opacity="0.1"/>
  </filter>
</defs>

<!-- Title -->
<text x="350" y="24" text-anchor="middle" font-family="Georgia, serif" font-size="15" class="txt" fill="#2C2418" font-weight="bold">Winning move algorithm: (1, 3, 5, 5) with k = 2</text>

<!-- ============================================================ -->
<!-- STEP 1: Binary decomposition (left column, y=45..220)        -->
<!-- ============================================================ -->
<g transform="translate(30, 50)">
  <text x="0" y="0" font-family="Georgia, serif" font-size="12" class="txt" fill="#2C2418" font-weight="bold">Step 1: Binary decomposition</text>

  <!-- Column headers -->
  <text x="100" y="28" text-anchor="middle" font-family="Georgia, serif" font-size="10" class="txt-sec" fill="#6B705C">2²</text>
  <text x="135" y="28" text-anchor="middle" font-family="Georgia, serif" font-size="10" class="txt-sec" fill="#6B705C">2¹</text>
  <text x="170" y="28" text-anchor="middle" font-family="Georgia, serif" font-size="10" class="txt-sec" fill="#6B705C">2⁰</text>

  <!-- Highlight column for bit v=1 (the 2¹ column) -->
  <rect x="118" y="16" width="35" height="130" class="xor-bg" fill="#B8860B" fill-opacity="0.08" rx="2"/>

  <!-- Row: n1=1 -->
  <text x="50" y="50" text-anchor="start" font-family="'JetBrains Mono', monospace" font-size="10" class="txt-sec" fill="#6B705C">n₁=1</text>
  <text x="100" y="50" text-anchor="middle" font-family="Georgia, serif" font-size="14" class="txt" fill="#2C2418">0</text>
  <text x="135" y="50" text-anchor="middle" font-family="Georgia, serif" font-size="14" class="txt" fill="#2C2418" font-weight="bold">0</text>
  <text x="170" y="50" text-anchor="middle" font-family="Georgia, serif" font-size="14" class="accent" fill="#B8860B" font-weight="bold">1</text>

  <!-- Row: n2=3 -->
  <text x="50" y="74" text-anchor="start" font-family="'JetBrains Mono', monospace" font-size="10" class="txt-sec" fill="#6B705C">n₂=3</text>
  <text x="100" y="74" text-anchor="middle" font-family="Georgia, serif" font-size="14" class="txt" fill="#2C2418">0</text>
  <text x="135" y="74" text-anchor="middle" font-family="Georgia, serif" font-size="14" class="accent" fill="#B8860B" font-weight="bold">1</text>
  <text x="170" y="74" text-anchor="middle" font-family="Georgia, serif" font-size="14" class="accent" fill="#B8860B" font-weight="bold">1</text>

  <!-- Row: n3=5 -->
  <text x="50" y="98" text-anchor="start" font-family="'JetBrains Mono', monospace" font-size="10" class="txt-sec" fill="#6B705C">n₃=5</text>
  <text x="100" y="98" text-anchor="middle" font-family="Georgia, serif" font-size="14" class="accent" fill="#B8860B" font-weight="bold">1</text>
  <text x="135" y="98" text-anchor="middle" font-family="Georgia, serif" font-size="14" class="txt" fill="#2C2418" font-weight="bold">0</text>
  <text x="170" y="98" text-anchor="middle" font-family="Georgia, serif" font-size="14" class="accent" fill="#B8860B" font-weight="bold">1</text>

  <!-- Row: n4=5 -->
  <text x="50" y="122" text-anchor="start" font-family="'JetBrains Mono', monospace" font-size="10" class="txt-sec" fill="#6B705C">n₄=5</text>
  <text x="100" y="122" text-anchor="middle" font-family="Georgia, serif" font-size="14" class="accent" fill="#B8860B" font-weight="bold">1</text>
  <text x="135" y="122" text-anchor="middle" font-family="Georgia, serif" font-size="14" class="txt" fill="#2C2418" font-weight="bold">0</text>
  <text x="170" y="122" text-anchor="middle" font-family="Georgia, serif" font-size="14" class="accent" fill="#B8860B" font-weight="bold">1</text>

  <!-- XOR line -->
  <line x1="80" y1="132" x2="200" y2="132" stroke="#2C2418" stroke-width="1.5" stroke-linecap="round"/>

  <!-- XOR result -->
  <text x="62" y="148" text-anchor="middle" font-family="Georgia, serif" font-size="11" class="accent" fill="#B8860B" font-weight="bold">⊕</text>
  <text x="100" y="148" text-anchor="middle" font-family="Georgia, serif" font-size="14" class="accent" fill="#B8860B" font-weight="bold">0</text>
  <text x="135" y="148" text-anchor="middle" font-family="Georgia, serif" font-size="14" class="accent" fill="#B8860B" font-weight="bold">1</text>
  <text x="170" y="148" text-anchor="middle" font-family="Georgia, serif" font-size="14" class="accent" fill="#B8860B" font-weight="bold">0</text>

  <!-- k value -->
  <text x="200" y="148" text-anchor="start" font-family="Georgia, serif" font-size="11" class="accent" fill="#B8860B" font-weight="bold">= k = 2 = 010₂</text>

  <!-- Arrow pointing to highlighted column -->
  <text x="135" y="172" text-anchor="middle" font-family="Georgia, serif" font-size="9" class="accent" fill="#B8860B" font-weight="bold">↑ v=1</text>
</g>

<!-- ============================================================ -->
<!-- STEP 2: Find heap (right column, y=50..175)                  -->
<!-- ============================================================ -->
<g transform="translate(380, 50)">
  <text x="0" y="0" font-family="Georgia, serif" font-size="12" class="txt" fill="#2C2418" font-weight="bold">Step 2: Find heap with bit v=1</text>

  <text x="10" y="28" font-family="'JetBrains Mono', monospace" font-size="11" class="txt-sec" fill="#6B705C">n₁ = 1 = 001₂  bit 1 = 0</text>
  <text x="10" y="50" font-family="'JetBrains Mono', monospace" font-size="11" class="accent" fill="#B8860B" font-weight="bold">n₂ = 3 = 011₂  bit 1 = 1 ✔</text>
  <text x="10" y="72" font-family="'JetBrains Mono', monospace" font-size="11" class="txt-sec" fill="#6B705C">n₃ = 5 = 101₂  bit 1 = 0</text>
  <text x="10" y="94" font-family="'JetBrains Mono', monospace" font-size="11" class="txt-sec" fill="#6B705C">n₄ = 5 = 101₂  bit 1 = 0</text>

  <text x="10" y="122" font-family="Georgia, serif" font-size="11" class="accent" fill="#B8860B" font-weight="bold">⇒ Choose heap 2 (n₂ = 3)</text>
</g>

<!-- ============================================================ -->
<!-- STEP 3: Compute move (right column, y=205..310)              -->
<!-- ============================================================ -->
<g transform="translate(380, 205)">
  <text x="0" y="0" font-family="Georgia, serif" font-size="12" class="txt" fill="#2C2418" font-weight="bold">Step 3: Compute winning move</text>

  <text x="10" y="28" font-family="'JetBrains Mono', monospace" font-size="11" class="txt-sec" fill="#6B705C">n₂* = n₂ ⊕ k = 3 ⊕ 2</text>
  <text x="10" y="50" font-family="'JetBrains Mono', monospace" font-size="11" class="txt-sec" fill="#6B705C">   = 011₂ ⊕ 010₂ = 001₂ = 1</text>
  <text x="10" y="78" font-family="'JetBrains Mono', monospace" font-size="11" class="txt-sec" fill="#6B705C">Verify: 1 &lt; 3  ✔</text>
  <text x="10" y="100" font-family="'JetBrains Mono', monospace" font-size="11" class="txt-sec" fill="#6B705C">Remove 2 tokens from heap 2</text>
</g>

<!-- ============================================================ -->
<!-- RESULT (full width, y=345..415)                              -->
<!-- ============================================================ -->
<g transform="translate(60, 345)">
  <text x="0" y="0" font-family="Georgia, serif" font-size="12" class="txt" fill="#2C2418" font-weight="bold">Result:</text>

  <!-- Before box -->
  <rect x="5" y="12" width="180" height="50" class="sienna-bg" fill="#A0522D" fill-opacity="0.1" rx="6" filter="url(#shadow)"/>
  <text x="95" y="35" text-anchor="middle" font-family="Georgia, serif" font-size="15" class="txt" fill="#2C2418" font-weight="bold">(1, 3, 5, 5)</text>
  <text x="95" y="53" text-anchor="middle" font-family="Georgia, serif" font-size="11" class="sienna" fill="#A0522D">nim-sum = 2 ≠ 0</text>

  <!-- Arrow -->
  <line x1="200" y1="37" x2="240" y2="37" stroke="#2C2418" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- After box -->
  <rect x="250" y="12" width="180" height="50" class="olive-bg" fill="#6B705C" fill-opacity="0.1" rx="6" filter="url(#shadow)"/>
  <text x="340" y="35" text-anchor="middle" font-family="Georgia, serif" font-size="15" class="txt" fill="#2C2418" font-weight="bold">(1, 1, 5, 5)</text>
  <text x="340" y="53" text-anchor="middle" font-family="Georgia, serif" font-size="11" class="olive" fill="#6B705C">nim-sum = 0  ✔</text>
</g>

<!-- Bottom annotation -->
<text x="350" y="460" text-anchor="middle" font-family="Georgia, serif" font-size="12" class="txt-sec" fill="#6B705C" font-style="italic">The opponent is now in a 𝒫-position (losing with perfect play)</text>
</svg>
